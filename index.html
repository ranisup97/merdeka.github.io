<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Merdeka Apps</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #F1F5F9 0%, #E2E8F0 60%, #CBD5E1 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 24px 16px;
    }

    .card {
      background: #ffffff;
      border-radius: 24px;
      padding: 40px 32px 36px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 4px 32px rgba(100, 116, 139, 0.13), 0 1px 4px rgba(100,116,139,0.08);
      animation: fadeUp 0.55s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .icon-wrap {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #64748B 0%, #94A3B8 100%);
      border-radius: 20px;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeUp 0.55s 0.05s cubic-bezier(0.22,1,0.36,1) both;
    }

    .icon-wrap svg {
      width: 36px;
      height: 36px;
      fill: none;
      stroke: #fff;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .title {
      font-size: 26px;
      font-weight: 700;
      color: #1E293B;
      text-align: center;
      letter-spacing: -0.3px;
      animation: fadeUp 0.55s 0.1s cubic-bezier(0.22,1,0.36,1) both;
    }

    .subtitle {
      font-size: 15px;
      color: #64748B;
      text-align: center;
      margin-top: 8px;
      line-height: 1.6;
      animation: fadeUp 0.55s 0.15s cubic-bezier(0.22,1,0.36,1) both;
    }

    .status-bar {
      margin: 24px 0 0;
      background: #F1F5F9;
      border-radius: 12px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      animation: fadeUp 0.55s 0.2s cubic-bezier(0.22,1,0.36,1) both;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #94A3B8;
      flex-shrink: 0;
      transition: background 0.4s;
    }
    .status-dot.active { background: #22C55E; animation: pulse 1.5s infinite; }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.4); }
      50%       { box-shadow: 0 0 0 6px rgba(34,197,94,0); }
    }

    .status-text {
      font-size: 13px;
      color: #64748B;
    }

    .countdown {
      font-weight: 600;
      color: #475569;
    }

    .divider {
      height: 1px;
      background: #E2E8F0;
      margin: 24px 0;
      animation: fadeUp 0.55s 0.25s cubic-bezier(0.22,1,0.36,1) both;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      animation: fadeUp 0.55s 0.3s cubic-bezier(0.22,1,0.36,1) both;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 12px 28px;
      border-radius: 14px;
      text-decoration: none;
      transition: transform 0.15s, box-shadow 0.15s;
      cursor: pointer;
      border: 1.5px solid rgba(255,255,255,0.15);
      background: #000000;
      color: #ffffff;
    }
    .btn:hover  { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
    .btn:active { transform: scale(0.98); }

    .btn-icon { flex-shrink: 0; display: flex; align-items: center; }

    .btn-text {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      line-height: 1.15;
    }
    .btn-text-top {
      font-size: 11px;
      font-weight: 400;
      color: rgba(255,255,255,0.82);
      letter-spacing: 0.3px;
    }
    .btn-text-bottom {
      font-size: 21px;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: -0.3px;
    }

    .logos-section {
      margin-top: 32px;
      animation: fadeUp 0.55s 0.38s cubic-bezier(0.22,1,0.36,1) both;
    }

    .logos-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #94A3B8;
      text-align: center;
      margin-bottom: 16px;
    }

    .logos-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      align-items: stretch;
    }

    .logo-pill {
      background: #ffffff;
      border: 1px solid #E2E8F0;
      border-radius: 12px;
      padding: 12px 10px;
      box-shadow: 0 2px 8px rgba(100,116,139,0.09);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 56px;
      transition: box-shadow 0.2s, transform 0.2s;
    }
    .logo-pill:hover {
      box-shadow: 0 4px 16px rgba(100,116,139,0.16);
      transform: translateY(-1px);
    }
    .logo-pill img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .footer-note {
      font-size: 12px;
      color: #94A3B8;
      text-align: center;
      margin-top: 28px;
      line-height: 1.6;
      animation: fadeUp 0.55s 0.45s cubic-bezier(0.22,1,0.36,1) both;
    }

    @media (max-width: 400px) {
      .card { padding: 32px 20px 28px; }
      .title { font-size: 22px; }
      .logo-pill { height: 48px; padding: 10px 8px; }
    }
  </style>
</head>
<body>

<div class="card">

  <div class="icon-wrap">
    <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
  </div>

  <h1 class="title">Merdeka Apps</h1>
  <p class="subtitle" id="subtitle-text">Mendeteksi perangkat Anda<br>dan menyiapkan pengalihan&hellip;</p>

  <div class="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <span class="status-text" id="status-text">Menghubungkan ke aplikasi<span class="countdown" id="countdown"> (2s)</span></span>
  </div>

  <div class="divider"></div>

  <div class="btn-group">
    <a id="btn-android" class="btn" href="https://play.google.com/store/apps/details?id=com.mdka.merdekaapps" target="_blank">
      <div class="btn-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M3.18 23.76c.3.17.64.22.97.15l.1-.06 9.35-9.35-2.83-2.83-7.59 12z" fill="#EA4335"/>
          <path d="M20.7 10.01l-2.72-1.57-3.14 3.14 3.14 3.14 2.75-1.59c.78-.45.78-1.57-.03-2.12z" fill="#FBBC04"/>
          <path d="M1.44.49C1.17.78 1 1.22 1 1.8v20.4c0 .58.17 1.02.45 1.3l.07.07 11.42-11.42v-.27L1.44.49z" fill="#4285F4"/>
          <path d="M14.6 12l-3.21-3.21L2.05.37C2.34.13 2.73.01 3.15.24L14.6 12z" fill="#34A853"/>
        </svg>
      </div>
      <div class="btn-text">
        <span class="btn-text-top">GET IT ON</span>
        <span class="btn-text-bottom">Google Play</span>
      </div>
    </a>
    <a id="btn-ios" class="btn" href="https://apps.apple.com/us/app/merdeka-apps/id6756284725" target="_blank">
      <div class="btn-icon">
        <svg width="28" height="34" viewBox="0 0 814 1000" fill="white" xmlns="http://www.w3.org/2000/svg">
          <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-57.8-155.5-127.4C46 790.7 0 663.6 0 541.8 0 347 130.3 238.7 258.5 238.7c66 0 121.1 43.4 162.5 43.4 39.5 0 101.1-46 176.3-46 28.5 0 130.9 2.6 198.3 99.2zm-234-181.5c31.1-36.9 53.1-88.1 53.1-139.3 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.6-55.1 135.5 0 7.8 1.3 15.6 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 45.4 0 102.5-30.4 135.5-71.3z"/>
        </svg>
      </div>
      <div class="btn-text">
        <span class="btn-text-top">Download on the</span>
        <span class="btn-text-bottom">App Store</span>
      </div>
    </a>
  </div>

  <div class="logos-section">
    <p class="logos-label">Merdeka Group</p>
    <div class="logos-row">
      <div class="logo-pill">
        <img src="logo_merdeka.png" alt="Merdeka Copper Gold" />
      </div>
      <div class="logo-pill">
        <img src="logo_emas.png" alt="Merdeka Gold Resources" />
      </div>
      <div class="logo-pill">
        <img src="logo_merdeka_battery.png" alt="Merdeka Battery Materials" />
      </div>
    </div>
  </div>

  <p class="footer-note" id="footer-note">
    Pengalihan otomatis dalam beberapa detik.<br>
    Gunakan tombol di atas jika tidak otomatis.
  </p>

</div>

<script>
  const ua = navigator.userAgent;
  const isAndroid = /android/i.test(ua);
  const isIOS = /iphone|ipad|ipod/i.test(ua);
  const path = window.location.pathname;
  const dot = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');
  const countdownEl = document.getElementById('countdown');
  const subtitleEl = document.getElementById('subtitle-text');
  const footerEl = document.getElementById('footer-note');

  let seconds = 5;

  function updateCountdown() {
    if (seconds > 0) {
      countdownEl.textContent = ' (' + seconds + 's)';
      seconds--;
      setTimeout(updateCountdown, 1000);
    } else {
      countdownEl.textContent = '';
      dot.classList.add('active');
      statusText.innerHTML = 'Mengalihkan ke aplikasi&hellip;';
      footerEl.textContent = 'Sedang membuka aplikasi…';

      if (isAndroid) {
        window.location.href = 'merdekaapp://' + path.replace('/', '');
        setTimeout(function() {
          window.location.href = 'https://play.google.com/store/apps/details?id=com.mdka.merdekaapps';
        }, 1500);
      } else if (isIOS) {
        window.location.href = 'merdekaapp://' + path.replace('/', '');
        setTimeout(function() {
          window.location.href = 'https://apps.apple.com/us/app/merdeka-apps/id6756284725';
        }, 1500);
      } else {
        dot.classList.add('active');
        statusText.innerHTML = 'Buka di perangkat mobile Anda';
        footerEl.textContent = 'Halaman ini dirancang untuk perangkat mobile.';
      }
    }
  }

  if (!isAndroid && !isIOS) {
    countdownEl.textContent = '';
    statusText.innerHTML = 'Gunakan perangkat mobile untuk redirect otomatis';
    subtitleEl.innerHTML = 'Scan atau buka halaman ini<br>dari smartphone Anda.';
    footerEl.textContent = 'Redirect otomatis hanya tersedia di Android & iOS.';
  } else {
    updateCountdown();
  }
</script>

</body>
</html>
